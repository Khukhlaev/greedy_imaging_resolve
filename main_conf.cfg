# Main config for the greedy imaging. Used by run_greedy_imaging.py. 

[base]
# Specifies the number of threads to be used for the run. For maximum performance this number should be >= (n_map_runs + n_vi_standalone_runs)
n_threads = 7

# Specifies the imaging config to be used by imaging.py
imaging_config = ./imaging_conf.cfg

# Specifies the main directory where the results are stored, it is created if it does not already exist. 
# Save files for articular epochs are located at root_output_directory/output_files/{source_name}/{dir_name}
# Images are located at root_output_directory/images/{source_name}/{dir_name}
root_output_directory = ./results

# Specifies the name of subdirectory where the results of the run are stored. If None, the name is taken from the data file name
dir_name = None

[observation]
# Here you can specify the path to the uvf data file to be used.
data_file = /path/to/file.uvf_raw_edt


[sky]
# In mas/pixel. Value of 0.05 is near a sweet spot for MOJAVE 15 GHz data
pixscale = 0.05

# Number of pixels in the x and y directions
n_pixels_x = 512
n_pixels_y = 512


[optimization]
# Number of iterations for MAP and VI optimizations, 20 is usually a sweet spot
n_iterations_map = 20
n_iterations_vi = 20

# Number of samples for VI run. Effective number of the samples is 4 times this value in the end.
# This is done for stability purposes, so fewer samples -> more samples as the VI optimization progresses
n_samples_vi = 10

# Number of VI runs that are performed on top of MAP estimations. Maximal reasonable value is around 10.
n_map_runs = 5

# Number of VI runs that are performed starting from the random gaussian prior. Maximal reasonable value is around 10.
n_vi_standalone_runs = 2
